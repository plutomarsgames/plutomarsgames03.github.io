<!DOCTYPE html>
<html>
<head>
  <title>🚀 PlutoMars Target Game</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #000, #111);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    #gameArea {
      position: relative;
      width: 100vw;
      height: 80vh;
    }

    #target {
      width: 60px;
      height: 60px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      box-shadow: 0 0 20px red;
      transition: transform 0.1s;
    }

    #target:active {
      transform: scale(0.8);
    }

    button {
      padding: 10px 20px;
      background: black;
      color: cyan;
      border: 2px solid cyan;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎯 PlutoMars Target Game</h1>

<p>Score: <span id="score">0</span> | Level: <span id="level">1</span> | Time: <span id="time">20</span>s</p>

<button onclick="startGame()">Start Game 🎮</button>

<div id="gameArea">
  <div id="target"></div>
</div>

<!-- Sounds -->
<audio id="bgMusic" loop>
  <source src="bg.mp3" type="audio/mpeg">
</audio>

<audio id="hitSound">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>
let score = 0;
let level = 1;
let timeLeft = 20;
let speed = 1000;
let gameRunning = false;

const target = document.getElementById("target");

function randomPosition() {
  const x = Math.random() * (window.innerWidth - 60);
  const y = Math.random() * (window.innerHeight - 150);
  target.style.left = x + "px";
  target.style.top = y + "px";
}

target.onclick = () => {
  if (!gameRunning) return;

  score++;
  document.getElementById("score").innerText = score;
  document.getElementById("hitSound").play();

  randomPosition();

  if (score % 5 === 0) {
    level++;
    speed -= 100;
    if (speed < 300) speed = 300;

    clearInterval(moveInterval);
    moveInterval = setInterval(randomPosition, speed);

    document.getElementById("level").innerText = level;
  }
};

let moveInterval;
let timer;

function startGame() {
  score = 0;
  level = 1;
  timeLeft = 20;
  speed = 1000;
  gameRunning = true;

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
  document.getElementById("time").innerText = timeLeft;

  document.getElementById("bgMusic").play();

  randomPosition();

  clearInterval(moveInterval);
  moveInterval = setInterval(randomPosition, speed);

  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameRunning = false;
  clearInterval(moveInterval);
  clearInterval(timer);

  alert("🔥 Game Over!\nScore: " + score + "\nLevel: " + level);
}
</script>

</body>
</html>
