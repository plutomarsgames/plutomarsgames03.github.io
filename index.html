<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlutoMars Racing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu">
    <h1>🏎️ PlutoMars Racing</h1>
    <button onclick="startSolo()">🤖 Play vs Bot</button>
    <button onclick="hostGame()">🌐 Host Multiplayer</button>
    <input id="joinId" placeholder="Enter Room ID to Join" />
    <button onclick="joinGame()">🔗 Join Multiplayer</button>
    <p id="roomInfo"></p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="mobileControls">
    <button id="btnLeft">◀</button>
    <button id="btnUp">▲</button>
    <button id="btnDown">▼</button>
    <button id="btnRight">▶</button>
  </div>
  <div id="hud">
    <span id="speed">Speed: 0</span>
    <span id="lap">Lap: 1/3</span>
    <span id="pos">Position: 1st</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
