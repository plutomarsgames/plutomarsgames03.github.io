<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Battle Racing</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
  </style>
</head>
<body>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== ARENA =====
const groundGeo = new THREE.PlaneGeometry(100,100);
const groundMat = new THREE.MeshStandardMaterial({color:0x111111});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PLAYER CAR =====
const carGeo = new THREE.BoxGeometry(1,0.5,2);
const carMat = new THREE.MeshStandardMaterial({color:0x00ffcc});
const car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.3;
scene.add(car);

// ===== VARIABLES =====
let speed = 0;
let turnSpeed = 0;

// ===== CONTROLS =====
document.addEventListener("keydown", (e)=>{
  if(e.key==="ArrowUp") speed += 0.02;
  if(e.key==="ArrowDown") speed -= 0.02;
  if(e.key==="ArrowLeft") turnSpeed += 0.03;
  if(e.key==="ArrowRight") turnSpeed -= 0.03;
});

// ===== GAME LOOP =====
function animate(){
  requestAnimationFrame(animate);

  // movement
  car.rotation.y += turnSpeed;
  car.position.x += Math.sin(car.rotation.y) * speed;
  car.position.z += Math.cos(car.rotation.y) * speed;

  // camera follow
  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 8;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}
animate();

// ===== RESPONSIVE =====
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
