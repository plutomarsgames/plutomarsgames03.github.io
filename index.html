<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Racing</title>
  <style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,5,10);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x333333})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== ROAD (CENTER STRIP) =====
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(10,300),
  new THREE.MeshStandardMaterial({color:0x555555})
);
road.rotation.x = -Math.PI/2;
road.position.y = 0.01;
scene.add(road);

// ===== CAR (WORKING BOX) =====
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.5,2),
  new THREE.MeshStandardMaterial({color:0x00ffcc})
);
car.position.y = 0.3;
scene.add(car);

// ===== VARIABLES =====
let speed = 0;
let turn = 0;

// ===== CONTROLS =====
document.addEventListener("keydown", (e)=>{
  if(e.key==="ArrowUp") speed += 0.02;
  if(e.key==="ArrowDown") speed -= 0.02;
  if(e.key==="ArrowLeft") turn += 0.03;
  if(e.key==="ArrowRight") turn -= 0.03;
});

// ===== GAME LOOP =====
function animate(){
  requestAnimationFrame(animate);

  // movement
  car.rotation.y += turn;
  car.position.x += Math.sin(car.rotation.y)*speed;
  car.position.z += Math.cos(car.rotation.y)*speed;

  // friction (realistic feel)
  speed *= 0.98;
  turn *= 0.9;

  // camera follow
  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 8;
  camera.position.y = 5;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}
animate();

// ===== RESPONSIVE =====
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
